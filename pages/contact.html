<!DOCTYPE html>
<html lang="en" dir="ltr" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Puristine Impex LLP for export inquiries and global partnership opportunities.">
  <meta property="og:title" content="Contact Us | Puristine Impex LLP">
  <title>Contact Us | Puristine Impex LLP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:'#071739',gold:'#D4A373','gray-soft':'#f8f9fb'},fontFamily:{heading:['Montserrat','sans-serif'],body:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body data-page="contact" class="font-body text-navy bg-white antialiased">
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="pt-24">
    <section class="py-16 lg:py-24 bg-gray-soft">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center reveal">
        <div class="line-gold mx-auto mb-6"></div>
        <h1 class="font-heading font-bold text-4xl sm:text-5xl text-navy mb-4" data-i18n="pages.contact.title"></h1>
        <p class="text-gray-600 text-lg max-w-xl mx-auto" data-i18n="pages.contact.subtitle"></p>
      </div>
    </section>

    <section class="py-16 lg:py-24">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid lg:grid-cols-5 gap-12 lg:gap-16">
          <div class="lg:col-span-3 reveal-left">
            <h2 class="font-heading font-bold text-2xl text-navy mb-8" data-i18n="pages.contact.formTitle"></h2>
            <form id="contact-form" class="space-y-6" novalidate>
              <div class="grid sm:grid-cols-2 gap-6">
                <div>
                  <label for="name" class="block text-sm font-medium text-navy mb-2" data-i18n="pages.contact.name"></label>
                  <input type="text" id="name" name="name" required class="input-premium" data-i18n-placeholder="pages.contact.name">
                </div>
                <div>
                  <label for="email" class="block text-sm font-medium text-navy mb-2" data-i18n="pages.contact.email"></label>
                  <input type="email" id="email" name="email" required class="input-premium" data-i18n-placeholder="pages.contact.email">
                </div>
              </div>
              <div class="grid sm:grid-cols-2 gap-6">
                <div>
                  <label for="company" class="block text-sm font-medium text-navy mb-2" data-i18n="pages.contact.company"></label>
                  <input type="text" id="company" name="company" class="input-premium" data-i18n-placeholder="pages.contact.company">
                </div>
                <div>
                  <label for="country" class="block text-sm font-medium text-navy mb-2" data-i18n="pages.contact.country"></label>
                  <input type="text" id="country" name="country" class="input-premium" data-i18n-placeholder="pages.contact.country">
                </div>
              </div>
              <div>
                <label for="message" class="block text-sm font-medium text-navy mb-2" data-i18n="pages.contact.message"></label>
                <textarea id="message" name="message" rows="5" required class="input-premium resize-none" data-i18n-placeholder="pages.contact.message"></textarea>
              </div>
              <button type="submit" class="btn-primary w-full sm:w-auto" data-i18n="pages.contact.submit"></button>
            </form>
          </div>

          <div class="lg:col-span-2 space-y-8 reveal-right">
            <div class="p-8 rounded-3xl bg-navy text-white">
              <h3 class="font-heading font-bold text-xl mb-4" data-i18n="pages.contact.exportCta"></h3>
              <p class="text-white/70 text-sm leading-relaxed mb-6" data-i18n="pages.contact.exportText"></p>
              <a href="mailto:info@puristineimpex.com" class="text-gold font-semibold hover:underline">info@puristineimpex.com</a>
            </div>
            <div class="p-8 rounded-3xl border border-gray-200">
              <h3 class="font-heading font-semibold text-navy mb-4" data-i18n="pages.contact.details"></h3>
              <ul class="space-y-3 text-gray-600 text-sm">
                <li data-i18n="footer.address"></li>
                <li><a href="mailto:info@puristineimpex.com" class="text-gold hover:underline">info@puristineimpex.com</a></li>
              </ul>
              <div class="mt-6 pt-6 border-t border-gray-200">
                <p class="text-sm font-medium text-navy mb-1" data-i18n="pages.contact.hours"></p>
                <p class="text-sm text-gray-600" data-i18n="pages.contact.hoursValue"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-20 reveal">
          <h3 class="font-heading font-semibold text-navy mb-4" data-i18n="pages.contact.map"></h3>
          <div class="rounded-3xl overflow-hidden border border-gray-200 aspect-[21/9] bg-gray-100 flex items-center justify-center">
            <iframe title="Map location" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d241317.11609823277!2d72.74109995!3d19.0821978!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDA0JzU2LjAiTiA3MsKwNDQnMjguMCJF!5e0!3m2!1sen!2sin!4v1" width="100%" height="100%" style="border:0;min-height:320px" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/images.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
