  <link rel="preconnect" href="https://fonts.googleapis.com">

<body data-page="about" class="font-body text-navy bg-white antialiased">

  <main id="main" class="pt-24">
    <section class="relative py-24 lg:py-32 bg-gray-soft overflow-hidden">

        <div class="max-w-3xl reveal">

            <h2 class="font-heading font-bold text-2xl text-navy mb-4" data-i18n="pages.about.vision.title"></h2>

            <p class="text-gray-600 leading-relaxed" data-i18n="pages.about.expertise.text"></p>

          <article class="reveal p-10 rounded-3xl bg-white border border-gray-200 card-premium" data-delay="100">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-gold mb-4" data-i18n="pages.about.commitment.label"></p>
            <h2 class="font-heading font-bold text-2xl text-navy mb-4" data-i18n="pages.about.commitment.title"></h2>
            <p class="text-gray-600 leading-relaxed" data-i18n="pages.about.commitment.text"></p>
          </article>

          <h2 class="font-heading font-bold text-3xl text-navy mb-4" data-i18n="pages.about.growth.title"></h2>
