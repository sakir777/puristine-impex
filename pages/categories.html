<!DOCTYPE html>
<html lang="en" dir="ltr" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="site:url" content="https://puristineimpex.com">
  <title>Product Categories | Puristine Impex LLP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:'#44749E',gold:'#ED835E','gray-soft':'#f8f9fb'},fontFamily:{heading:['Montserrat','sans-serif'],body:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css">

<body data-page="categories" data-meta-page="pages.categories" class="font-body text-navy bg-white antialiased">
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="pt-24">
    <section class="relative py-20 lg:py-28 bg-navy text-white overflow-hidden">
      <div class="absolute inset-0 world-map-bg opacity-15"></div>
      <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center reveal">
        <div class="line-gold mx-auto mb-6 bg-gold"></div>
        <h1 class="font-heading font-bold text-4xl sm:text-5xl lg:text-6xl mb-6" data-i18n="pages.categories.title"></h1>
        <p class="text-white/70 text-lg max-w-2xl mx-auto" data-i18n="pages.categories.subtitle"></p>
      </div>
    </section>

    <section class="py-16 lg:py-24">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-xl mx-auto mb-12 reveal">
          <label for="category-search" class="sr-only">Search categories</label>
          <div class="relative">
            <svg class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="search" id="category-search" class="input-premium !pl-14 !py-5 !rounded-2xl" data-i18n-placeholder="pages.categories.search" placeholder="Search categories...">
          </div>
        </div>
        <div id="all-categories-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/images.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script src="../assets/js/main.js"></script>

</html>
